spring:
  datasource:
    url: jdbc:tc:postgresql:16:///booker_test?TC_INITSCRIPT=classpath:db/migration/V1__init_auth.sql
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: false   # Testcontainers init script handles schema

app:
  jwt:
    secret: dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtYXQtbGVhc3QtMjU2LWJpdHMtbG9uZy1mb3ItaW50ZWdyYXRpb24tdGVzdGluZw==
    expiration-ms: 3600000
  refresh-token:
    expiry-days: 7
  password-reset:
    expiry-hours: 1
    base-url: http://localhost:4200
  cors:
    allowed-origins:
      - http://localhost:4200

server:
  servlet:
    context-path: /api

logging:
  level:
    com.booker: DEBUG
    org.springframework.security: DEBUG
