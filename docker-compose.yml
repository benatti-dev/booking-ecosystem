services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: booker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       booker
      POSTGRES_USER:     booker
      POSTGRES_PASSWORD: booker_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booker -d booker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: booker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./booker-backend
      dockerfile: Dockerfile
    container_name: booker-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL:       jdbc:postgresql://postgres:5432/booker
      DB_USER:      booker
      DB_PASS:      booker_secret
      JWT_SECRET:   ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      MAIL_HOST:    ${MAIL_HOST:-smtp.sendgrid.net}
      MAIL_PORT:    ${MAIL_PORT:-587}
      MAIL_USER:    ${MAIL_USER:-apikey}
      MAIL_PASS:    ${MAIL_PASS:-changeme}
      MAIL_FROM:    ${MAIL_FROM:-noreply@booker.app}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:

