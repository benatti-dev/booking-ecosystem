<nav class="bg-white shadow-sm border-b border-gray-200">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">

      <a routerLink="/home" class="flex items-center gap-2 text-xl font-bold text-blue-600">
        Booker
      </a>

      <div class="hidden md:flex items-center gap-6 text-sm text-gray-600">
        <a routerLink="/home" class="hover:text-blue-600 transition-colors">Browse</a>
      </div>

      <div class="flex items-center gap-3">
        <ng-container *ngIf="auth.isAuthenticated$ | async; else guestLinks">
          <span class="text-sm text-gray-700">
            {{ (auth.user$ | async)?.email }}
          </span>
          <a routerLink="/dashboard"
             class="text-sm text-gray-600 hover:text-blue-600 transition-colors">
            My Bookings
          </a>
          <button (click)="logout()"
                  class="text-sm bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-lg transition-colors">
            Logout
          </button>
        </ng-container>

        <ng-template #guestLinks>
          <a routerLink="/login"
             class="text-sm text-gray-600 hover:text-blue-600 transition-colors">
            Login
          </a>
          <a routerLink="/register"
             class="text-sm bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
            Sign up
          </a>
        </ng-template>
      </div>

    </div>
  </div>
</nav>
