<article class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 sm:p-6" aria-label="Business information">
  <div class="flex flex-col sm:flex-row gap-5 sm:gap-6">

    <!-- Venue photo -->
    <div class="w-full sm:w-36 h-44 sm:h-28 flex-shrink-0 rounded-xl overflow-hidden bg-indigo-50">
      @if (business.logoUrl) {
        <img [src]="business.logoUrl" [alt]="business.name + ' photo'"
          class="w-full h-full object-cover" loading="eager" />
      } @else {
        <div class="w-full h-full flex items-center justify-center">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            class="text-indigo-300" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
        </div>
      }
    </div>

    <!-- Name / category / description -->
    <div class="flex-1 min-w-0">
      <h1 class="text-xl sm:text-2xl font-bold text-gray-900 leading-tight mb-1.5">
        {{ business.name }}
      </h1>
      <p class="flex items-center gap-1.5 text-indigo-600 text-sm font-semibold mb-3">
        <!-- category icon -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0" />
        </svg>
        {{ business.category.label || business.category.name }}
      </p>
      @if (business.description) {
        <p class="text-gray-500 text-sm leading-relaxed max-w-xl">{{ business.description }}</p>
      }
    </div>

    <!-- Contact details (right column on sm+) -->
    @if (branch) {
      <div class="flex flex-col gap-2.5 text-sm text-gray-600 sm:items-end sm:text-right flex-shrink-0">
        @if (fullAddress) {
          <div class="flex items-start gap-2 sm:flex-row-reverse">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              class="text-gray-400 mt-0.5 flex-shrink-0" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z" />
              <circle cx="12" cy="11" r="3" stroke-width="2" />
            </svg>
            <span>{{ fullAddress }}</span>
          </div>
        }
        @if (branch.phone) {
          <div class="flex items-center gap-2 sm:flex-row-reverse">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              class="text-gray-400 flex-shrink-0" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.948V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 7V5z" />
            </svg>
            <a [href]="'tel:' + branch.phone"
              class="hover:text-indigo-600 transition-colors duration-150">{{ branch.phone }}</a>
          </div>
        }
      </div>
    }

  </div>
</article>
