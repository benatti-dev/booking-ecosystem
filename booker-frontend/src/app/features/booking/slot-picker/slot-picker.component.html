<div class="slot-picker">
  <!-- Date navigation -->
  <div class="flex items-center gap-3 mb-4">
    <button
      class="p-2 rounded-lg border hover:bg-gray-50 disabled:opacity-50"
      [disabled]="isToday()"
      (click)="changeDate(-1)">
      &#8249;
    </button>
    <span class="font-medium text-gray-700 flex-1 text-center">
      {{ formatDate(currentDate) }}
    </span>
    <button
      class="p-2 rounded-lg border hover:bg-gray-50"
      (click)="changeDate(1)">
      &#8250;
    </button>
  </div>

  <!-- Loading -->
  @if (loading) {
    <div class="text-center py-6 text-gray-500">
      Loading available slots...
    </div>
  }

  <!-- Slots grid -->
  @if (!loading) {
    @if (slots?.availableSlots?.length) {
      <div
        class="grid grid-cols-3 gap-2">
        @for (slot of slots?.availableSlots; track slot) {
          <button
            class="py-2 px-3 rounded-lg border text-sm font-medium transition-colors"
            [class.bg-indigo-600]="selectedSlot === slot"
            [class.text-white]="selectedSlot === slot"
            [class.border-indigo-600]="selectedSlot === slot"
            [class.hover:bg-indigo-50]="selectedSlot !== slot"
            (click)="selectSlot(slot)">
            {{ formatTime(slot) }}
          </button>
        }
      </div>
    } @else {
      <div class="text-center py-8 text-gray-400">
        <p class="text-3xl mb-2">📅</p>
        <p>No available slots for this date</p>
      </div>
    }
  }
</div>
