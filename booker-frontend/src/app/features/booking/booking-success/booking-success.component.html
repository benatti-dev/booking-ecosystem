<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md text-center">
    <div class="bg-white rounded-2xl shadow-sm p-10">
      <!-- Success icon -->
      <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>

      <h1 class="text-2xl font-bold text-gray-900 mb-2">Booking Created!</h1>
      <p class="text-gray-500 mb-6">
        Your appointment is pending confirmation from the business.
      </p>

      <ng-container *ngIf="booking">
        <div class="bg-gray-50 rounded-xl p-4 text-sm text-left space-y-2 mb-6">
          <div class="flex justify-between">
            <span class="text-gray-500">Booking #</span>
            <span class="font-mono font-medium">{{ booking.id }}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">Service</span>
            <span class="font-medium">{{ booking.serviceName }}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">Date &amp; Time</span>
            <span class="font-medium">{{ formatDateTime(booking.startTime) }}</span>
          </div>
          <div class="flex justify-between" *ngIf="booking.employeeName">
            <span class="text-gray-500">Specialist</span>
            <span class="font-medium">{{ booking.employeeName }}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">Status</span>
            <span class="font-semibold text-orange-600">Pending confirmation</span>
          </div>
        </div>
      </ng-container>

      <div class="flex flex-col gap-3">
        <a routerLink="/dashboard"
           class="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition-colors">
          My Bookings
        </a>
        <a routerLink="/home"
           class="w-full py-3 border border-gray-300 text-gray-700 rounded-xl hover:bg-gray-50 transition-colors">
          Back to Home
        </a>
      </div>
    </div>
  </div>
</div>
