<div class="max-w-6xl mx-auto px-4 py-10">
  <h1 class="text-2xl font-bold text-gray-900 mb-1">Admin Panel</h1>
  <p class="text-gray-500 mb-6">Platform moderation — approve or reject new businesses.</p>

  <div *ngIf="loading$ | async" class="text-gray-400">Loading...</div>
  <div *ngIf="error$ | async as err" class="p-4 bg-red-50 text-red-600 rounded-lg mb-4">{{ err }}</div>

  <!-- Pending businesses -->
  <section>
    <h2 class="text-lg font-semibold text-gray-700 mb-4">
      Pending Approval
      <span class="ml-2 text-sm bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full font-medium">
        {{ (pending$ | async)?.length ?? 0 }}
      </span>
    </h2>

    <div *ngIf="!(loading$ | async) && (pending$ | async)?.length === 0 && !(error$ | async)"
         class="text-gray-400 py-8 text-center">All caught up — no pending businesses.</div>

    <div *ngIf="!(loading$ | async) && (pending$ | async)?.length"
         class="space-y-3">
      <div *ngFor="let b of pending$ | async"
           class="bg-white rounded-xl shadow border border-gray-100 p-5 flex items-center justify-between gap-4">
        <div>
          <div class="flex items-center gap-2 mb-1">
            <h3 class="font-semibold text-gray-900">{{ b.name }}</h3>
            <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">
              {{ b.category.label }}
            </span>
          </div>
          <p *ngIf="b.description" class="text-sm text-gray-500 line-clamp-1">{{ b.description }}</p>
          <p class="text-xs text-gray-400 mt-1">Owner: {{ b.ownerName }}</p>
        </div>
        <div class="flex gap-2 flex-shrink-0">
          <button (click)="approve(b.id)"
                  class="px-4 py-1.5 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 font-medium">
            Approve
          </button>
          <button (click)="reject(b.id)"
                  class="px-4 py-1.5 bg-red-100 text-red-600 text-sm rounded-lg hover:bg-red-200 font-medium">
            Reject
          </button>
        </div>
      </div>
    </div>
  </section>
</div>
