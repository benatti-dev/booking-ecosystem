<div class="max-w-7xl mx-auto px-4 py-10">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Admin Panel</h1>

  <!-- Tab navigation -->
  <nav class="flex gap-1 border-b border-gray-200 mb-8">
    @for (tab of tabs; track tab.path) {
      <a
        [routerLink]="tab.path"
        routerLinkActive="border-b-2 border-indigo-600 text-indigo-600 font-semibold"
        class="flex items-center gap-1.5 px-4 py-2 text-sm text-gray-600 hover:text-indigo-600 transition-colors">
        <span>{{ tab.icon }}</span>
        <span>{{ tab.label }}</span>
      </a>
    }
  </nav>

  <!-- Child route outlet -->
  <router-outlet />
</div>
