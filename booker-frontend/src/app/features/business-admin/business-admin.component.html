<div class="flex h-screen bg-gray-100">
  <!-- Sidenav -->
  <aside class="w-64 bg-white shadow-md flex flex-col flex-shrink-0">
    <div class="p-6 border-b">
      <h2 class="text-lg font-bold text-blue-700">Business Portal</h2>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="bg-blue-50 text-blue-700 font-semibold"
        class="flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors"
      >
        <span>{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-auto">
    <router-outlet />
  </main>
</div>
