<div class="bg-white rounded-2xl shadow-sm p-6">
  <h2 class="text-lg font-semibold text-gray-800 mb-5">Schedule Management</h2>

  <div *ngIf="loading" class="text-gray-400 text-center py-6">Loading...</div>
  <div *ngIf="saved" class="mb-4 p-3 bg-green-50 text-green-700 rounded-lg text-sm">
    Schedule saved ✓
  </div>

  <form [formGroup]="form" (ngSubmit)="save()">
    <div formArrayName="rules">
      <div *ngFor="let day of days; let i = index" [formGroupName]="i"
           class="border border-gray-100 rounded-xl p-4 mb-3">
        <div class="flex items-center gap-4 mb-3">
          <span class="text-sm font-semibold text-gray-700 w-8">{{ DAY_NAMES[day] }}</span>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" formControlName="isWorkingDay"
                   class="w-4 h-4 text-indigo-600 rounded">
            <span class="text-sm text-gray-600">Working day</span>
          </label>
        </div>

        <ng-container *ngIf="rulesArray.at(i).get('isWorkingDay')?.value">
          <div class="flex items-center gap-3 mb-3">
            <div>
              <label class="text-xs text-gray-500">From</label>
              <input type="time" formControlName="startTime"
                     class="block border rounded px-2 py-1 text-sm mt-1">
            </div>
            <div>
              <label class="text-xs text-gray-500">To</label>
              <input type="time" formControlName="endTime"
                     class="block border rounded px-2 py-1 text-sm mt-1">
            </div>
          </div>
        </ng-container>
      </div>
    </div>

    <button
      type="submit"
      class="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-50"
      [disabled]="saving">
      {{ saving ? 'Saving...' : 'Save Schedule' }}
    </button>
  </form>
</div>
