<div class="p-6">
  <div class="flex items-center gap-3 mb-6">
    <button (click)="back()"
      class="text-sm text-gray-500 hover:text-gray-700 flex items-center gap-1 transition-colors">
      ← Employees
    </button>
    @if (employee) {
      <h2 class="text-lg font-semibold text-gray-800">
        Schedule — {{ employee.displayName }}
        @if (employee.position) {
          <span class="text-sm font-normal text-gray-500">({{ employee.position }})</span>
        }
      </h2>
    }
  </div>

  <app-schedule-management [employeeId]="employeeId" />
</div>
