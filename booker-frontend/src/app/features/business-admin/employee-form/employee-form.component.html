<div class="p-6 max-w-lg">
  <h2 class="text-lg font-semibold text-gray-800 mb-6">Add Employee</h2>

  <app-alert [message]="error" />

  <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

    <app-form-field label="Display Name *" [control]="displayNameCtrl"
      errorMessage="Display name is required">
      <input formControlName="displayName" type="text" placeholder="Jane Doe"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
    </app-form-field>

    <app-form-field label="Position" [control]="positionCtrl" errorMessage="">
      <input formControlName="position" type="text" placeholder="Stylist, Trainer, etc."
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
    </app-form-field>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Bio</label>
      <textarea formControlName="bio" rows="3" placeholder="Short bio (optional)"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 resize-none">
      </textarea>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Linked User ID
        <span class="text-xs text-gray-400 ml-1">(optional — links to an existing account)</span>
      </label>
      <input formControlName="userId" type="number" placeholder="User account ID"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" [disabled]="saving"
        class="btn btn-primary btn-md">
        {{ saving ? 'Saving…' : 'Add Employee' }}
      </button>
      <button type="button" (click)="cancel()"
        class="btn btn-secondary btn-md">
        Cancel
      </button>
    </div>
  </form>
</div>
