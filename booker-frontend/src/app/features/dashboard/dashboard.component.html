<div class="max-w-4xl mx-auto px-4 py-10">

  <h1 class="text-2xl font-bold text-gray-900 mb-2">My Dashboard</h1>
  <p class="text-gray-500 mb-8" *ngIf="auth.user$ | async as user">
    Welcome back, <strong>{{ user.email }}</strong>
  </p>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <p class="text-sm text-gray-500">Upcoming bookings</p>
      <p class="text-2xl font-bold text-gray-900 mt-1">—</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <p class="text-sm text-gray-500">Past bookings</p>
      <p class="text-2xl font-bold text-gray-900 mt-1">—</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <p class="text-sm text-gray-500">Favourite businesses</p>
      <p class="text-2xl font-bold text-gray-900 mt-1">—</p>
    </div>
  </div>

  <div class="bg-blue-50 border border-blue-200 rounded-xl p-6 text-center">
    <p class="text-blue-800 font-medium mb-3">Ready to book your first service?</p>
    <a routerLink="/home"
       class="inline-block bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors">
      Browse services
    </a>
  </div>

</div>
