<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to your Booker account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input formControlName="email" type="email" autocomplete="email"
          placeholder="you@example.com"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          [class.border-red-500]="isInvalid('email')" />
          @if (isInvalid('email')) {
            <p class="text-xs text-red-500 mt-1">
              Enter a valid email address
            </p>
          }
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input formControlName="password" type="password" autocomplete="current-password"
            placeholder="••••••••"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [class.border-red-500]="isInvalid('password')" />
          </div>

          <app-alert [message]="error"></app-alert>

          <button type="submit" [disabled]="loading"
            class="btn-primary btn-block py-2.5 text-sm">
            {{ loading ? 'Signing in...' : 'Sign in' }}
          </button>

        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
          Don't have an account?
          <a routerLink="/register" class="text-blue-600 hover:underline font-medium">Sign up</a>
        </p>

      </div>
    </div>
